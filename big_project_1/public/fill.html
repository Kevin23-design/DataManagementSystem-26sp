<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>填写问卷</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">📋 问卷系统</span>
    <div class="nav-actions">
      <span class="nav-user" id="navUser"></span>
    </div>
  </nav>

  <div class="container">
    <div id="surveyHeader" class="card mb-2">
      <h1 id="surveyTitle">加载中...</h1>
      <p id="surveyDesc" class="text-secondary"></p>
    </div>

    <div id="alert"></div>
    <div id="questionArea"></div>

    <div id="submitArea" class="hidden" style="margin-top:24px;">
      <button class="btn btn-primary" id="submitBtn" style="width:100%;justify-content:center;padding:14px;font-size:1.05rem;">
        提交问卷
      </button>
    </div>

    <div id="successArea" class="hidden text-center" style="margin-top:48px;">
      <h2 style="color:var(--success);margin-bottom:12px;">✅ 提交成功！</h2>
      <p class="text-secondary">感谢你的参与</p>
    </div>
  </div>

  <script src="/js/fill.js"></script>
</body>
</html>
