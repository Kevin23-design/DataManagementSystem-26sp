<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>填写问卷</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">问卷系统</span>
    <div class="nav-actions">
      <span class="nav-user" id="navUser"></span>
    </div>
  </nav>

  <div class="container">
    <div id="surveyHeader" class="card mb-2">
      <h1 id="surveyTitle">加载中...</h1>
      <p id="surveyDesc" class="text-secondary"></p>
    </div>

    <div id="alert"></div>
    <div id="questionArea" class="stack"></div>

    <div id="submitArea" class="hidden mt-2">
      <button class="btn btn-primary" id="submitBtn" style="width:100%;">
        提交问卷
      </button>
    </div>

    <div id="successArea" class="hidden card text-center mt-2">
      <h2 style="color:var(--success);margin-bottom:12px;">提交成功</h2>
      <p class="text-secondary">感谢你的参与</p>
    </div>
  </div>

  <script src="/js/fill.js"></script>
</body>
</html>
